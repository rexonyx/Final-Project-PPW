<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabung Skena - Thrift Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #f8f9fa; /* Abu-abu super terang clean */
            --text-dark: #111111; /* Hitam pekat modern */
            --text-muted: #666666;
            --accent: #2563eb; /* Biru elektrik khas modern utility */
            --card-border: #e5e7eb;
        }

        body {
            background-color: var(--bg-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-container {
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .register-card {
            background: #ffffff;
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02);
        }

        .brand-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.75rem;
            letter-spacing: -0.5px;
            color: var(--text-dark);
        }

        .sub-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 400;
        }

        /* Form Styling */
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 18px;
        }

        .form-control {
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 11px 16px;
            font-size: 0.95rem;
            font-weight: 500;
            background-color: #ffffff;
            color: var(--text-dark);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-control::placeholder {
            color: #9ca3af;
            font-weight: 400;
        }

        .form-control:focus {
            background-color: #ffffff;
            border-color: var(--text-dark);
            box-shadow: 0 0 0 4px rgba(17, 17, 17, 0.05);
            color: var(--text-dark);
        }

        /* Button Styling */
        .btn-submit {
            background-color: var(--text-dark);
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: #222222;
            color: #ffffff;
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Alert Styling */
        .alert {
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.85rem;
            padding: 10px 16px;
            border: none;
        }
        .alert-danger {
            background-color: #fef2f2;
            color: #ef4444;
        }
        .alert-success {
            background-color: #f0fdf4;
            color: #22c55e;
        }

        .login-link {
            color: var(--text-dark);
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1.5px solid var(--text-dark);
            transition: all 0.15s ease;
        }

        .login-link:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="register-card">
            
            <div class="text-center mb-4">
                <h2 class="brand-title text-uppercase mb-1">Mulai Berburu</h2>
                <p class="sub-title">Buat akun untuk mengamankan item thrift pilihanmu.</p>
            </div>

            <div id="alertBox" class="alert d-none text-center mb-3" role="alert"></div>

            <form id="registerForm">
                <div class="input-group-custom">
                    <label for="nama" class="form-label">Nama Lengkap</label>
                    <input type="text" id="nama" class="form-control" placeholder="Nama lengkap kamu" required>
                </div>

                <div class="input-group-custom">
                    <label for="email" class="form-label">Alamat Email</label>
                    <input type="email" id="email" class="form-control" placeholder="kamu@email.com" required>
                </div>

                <div class="input-group-custom">
                    <label for="whatsapp" class="form-label">Nomor WhatsApp</label>
                    <input type="tel" id="whatsapp" class="form-control" placeholder="081234567xxx" required>
                </div>

                <div class="input-group-custom">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Minimal 6 karakter" minlength="6" required>
                </div>

                <div class="input-group-custom mb-4">
                    <label for="konfirmasiPassword" class="form-label">Konfirmasi Password</label>
                    <input type="password" id="konfirmasiPassword" class="form-control" placeholder="Ulangi password" required>
                </div>

                <button type="submit" class="btn btn-submit w-100">
                    DAFTAR SEKARANG 
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3.33334 8H12.6667" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M8 3.33334L12.6667 8L8 12.6667" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>

            <div class="text-center mt-4 small text-muted">
                Sudah punya akun? <a href="login.html" class="login-link">Masuk disini</a>
            </div>
            
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const password = document.getElementById('password');
        const konfirmasiPassword = document.getElementById('konfirmasiPassword');
        const alertBox = document.getElementById('alertBox');

        registerForm.addEventListener('submit', function(event) {
            event.preventDefault(); 

            alertBox.classList.add('d-none');
            alertBox.classList.remove('alert-danger', 'alert-success');

            if (password.value !== konfirmasiPassword.value) {
                alertBox.classList.remove('d-none');
                alertBox.classList.add('alert-danger');
                alertBox.innerText = "Password dan Konfirmasi Password tidak sama!";
                return;
            }

            alertBox.classList.remove('d-none');
            alertBox.classList.add('alert-success');
            alertBox.innerText = "Pendaftaran Berhasil! Silakan masuk ke akunmu.";
            
            registerForm.reset();
        });
    </script>

</body>
</html>
