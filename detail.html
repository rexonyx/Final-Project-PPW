<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecondKick - Detail Produk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" href="FinalProjectPPW.html">Second<span class="text-warning">Kick</span></a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="FinalProjectPPW.html">Home</a>
                <a class="nav-link" href="products.html">Kembali ke Katalog</a>
                <a class="nav-link" href="cart.html">Cart</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row bg-white p-4 rounded shadow-sm align-items-center">
            <div class="col-md-6 text-center">
                <img id="prodImg" src="" class="img-fluid rounded mb-3 product-detail-img" alt="Produk">
            </div>
            <div class="col-md-6">
                <h1 id="prodName" class="fw-bold"></h1>
                <h3 id="prodPrice" class="text-danger fw-bold my-3"></h3>
                <p id="prodDesc" class="lead text-muted"></p>
                <button id="addCartBtn" class="btn btn-success btn-lg mt-3">🛒 Tambah ke Keranjang</button>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-12">
                <h3 class="fw-bold mb-3 text-center">Video Review Sepatu</h3>
                <div class="ratio ratio-16x9">
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Review Video" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data Dummy Terbaca Lewat Parameter URL (?id=p1, p2, dst.)
        const products = {
            "p1": {
                name: "Sepatu Preloved Outdoor",
                price: 450000,
                desc: "Sepatu Nike preloved outdoor, bersih dan siap pakai. Kondisi masih sangat bagus dengan insole nyaman.",
                img: "image/s1.jpeg"
            },
            "p2": {
                name: "Casual Black Red Sepatu",
                price: 320000,
                desc: "Sepatu Ventela casual hitam merah, cocok untuk gaya street dan sehari-hari.",
                img: "image/s3.jpeg"
            },
            "p3": {
                name: "Nike Toki Low Gray Black",
                price: 380000,
                desc: "Sepatu Nike Toki low abu-abu hitam, like new dengan kondisi rapi dan nyaman dipakai.",
                img: "image/s4.jpeg"
            },
            "p4": {
                name: "Casual Beige Slip On Sepatu",
                price: 550000,
                desc: "Sepatu slip on beige Nike, ringan dan mudah dipakai dengan gaya santai.",
                img: "image/s5.jpeg"
            },
            "p5": {
                name: "Converse Run Star Legacy CX",
                price: 450000,
                desc: "Sepatu Converse Run Star Legacy CX, tampilan klasik dengan sentuhan vintage.",
                img: "image/ssptu.jpg"
            },
            "p6": {
                name: "Staccato Espadrille Slip On",
                price: 100000,
                desc: "Sepatu Staccato espadrille slip on, ringan dan nyaman untuk tampilan kasual.",
                img: "image/sepatu st.jpg"
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const selectedProduct = products[productId];

        if (selectedProduct) {
            document.getElementById("prodImg").src = selectedProduct.img;
            document.getElementById("prodName").innerText = selectedProduct.name;
            document.getElementById("prodPrice").innerText = "Rp " + selectedProduct.price.toLocaleString('id-ID');
            document.getElementById("prodDesc").innerText = selectedProduct.desc;
        } else {
            document.getElementById("prodName").innerText = "Produk tidak ditemukan";
            document.getElementById("prodPrice").innerText = "";
            document.getElementById("prodDesc").innerText = "Maaf, detail produk tidak tersedia. Kembali ke katalog untuk memilih produk lain.";
            document.getElementById("addCartBtn").disabled = true;
        }

        // Logic Add To Cart
        document.getElementById("addCartBtn").addEventListener("click", function() {
            if (!selectedProduct) return;

            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.push(selectedProduct);
            localStorage.setItem("cart", JSON.stringify(cart));
            alert(`${selectedProduct.name} berhasil ditambahkan ke keranjang!`);
            window.location.href = "cart.html";
        });
    </script>
</body>
</html>
