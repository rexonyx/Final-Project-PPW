<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecondKick - Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" href="FinalProjectPPW.html">Second<span class="text-warning">Kick</span></a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="FinalProjectPPW.html">Home</a>
                <a class="nav-link" href="FinalProjectPPW.html ">Lanjut Belanja</a>
                <a class="nav-link" href="tentang.html">Tentang Kami</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="fw-bold mb-4">Keranjang Belanja Anda</h2>
        <div class="row">
            <div class="col-md-8">
                <ul class="list-group mb-3" id="cartList">
                    </ul>
                <button class="btn btn-danger btn-sm" id="clearCartBtn">Kosongkan Keranjang</button>
            </div>
            <div class="col-md-4">
                <div class="card p-3 bg-light">
                    <h4 class="fw-bold">Ringkasan</h4>
                    <hr>
                    <div class="d-flex justify-content-between mb-3">
                        <span>Total Bayar:</span>
                        <strong id="totalPrice" class="text-danger">Rp 0</strong>
                    </div>
                    <button class="btn btn-warning w-100 fw-bold" id="checkoutBtn">Checkout Sekarang</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadCart() {
            const cart = JSON.parse(localStorage.getItem("cart")) || [];
            const cartList = document.getElementById("cartList");
            let total = 0;

            cartList.innerHTML = "";

            if (cart.length === 0) {
                cartList.innerHTML = "<li class='list-group-item text-center py-4 text-muted'>Keranjang Anda masih kosong.</li>";
                document.getElementById("totalPrice").innerText = "Rp 0";
                return;
            }

            cart.forEach((item) => {
                const quantity = item.quantity || 1;
                const itemTotal = item.price * quantity;
                const li = document.createElement("li");
                li.className = "list-group-item d-flex justify-content-between align-items-center";
                li.innerHTML = `
                    <div class="d-flex align-items-center">
                        <img src="${item.img}" class="rounded cart-item-img">
                        <div>
                            <h6 class="my-0 fw-bold">${item.name}</h6>
                            <small class="text-muted">Qty: ${quantity}</small>
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn btn-outline-secondary btn-sm" onclick="changeQuantity('${item.id}', -1)">-</button>
                        <span class="fw-bold">${quantity}</span>
                        <button class="btn btn-outline-secondary btn-sm" onclick="changeQuantity('${item.id}', 1)">+</button>
                        <span class="text-danger fw-bold ms-2">Rp ${itemTotal.toLocaleString('id-ID')}</span>
                    </div>
                `;
                cartList.appendChild(li);
                total += itemTotal;
            });

            document.getElementById("totalPrice").innerText = "Rp " + total.toLocaleString('id-ID');
        }

        function changeQuantity(productId, delta) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart = cart.map((item) => {
                if (item.id === productId) {
                    const newQuantity = (item.quantity || 1) + delta;
                    return newQuantity > 0 ? { ...item, quantity: newQuantity } : null;
                }
                return item;
            }).filter(Boolean);

            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        document.getElementById("clearCartBtn").addEventListener("click", function() {
            localStorage.removeItem("cart");
            loadCart();
        });

        document.getElementById("checkoutBtn").addEventListener("click", function() {
            const cart = JSON.parse(localStorage.getItem("cart")) || [];
            if(cart.length === 0) {
                alert("Keranjang masih kosong!");
                return;
            }
            alert("Terima kasih telah melakukan pembelian! Pesanan Anda diproses.");
            localStorage.removeItem("cart");
            window.location.href = "index.html";
        });

        // Jalankan fungsi loadCart saat pertama dibuka
        document.addEventListener("DOMContentLoaded", loadCart);
    </script>
</body>
</html>
