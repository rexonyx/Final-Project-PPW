<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SecondKick</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* CSS Manual sisa sedikit, hanya untuk warna kustom bertema thrift */
        body {
            background-color:rgb(99, 19, 19); 
            height: 100vh;
        }
        .bg-dark-thrift {
            background-color: #2c2c2c;
            color: white;
        }
        .bg-dark-thrift:hover {
            background-color: #555555;
            color: white;
        }
        header {
            background-color: #2c2c2c;
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold text-uppercase" href="FinalProjectPPW.html">Second<span class="text-warning">Kick</span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link active" href="FinalProjectPPW.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="FinalProjectPPW.html#katalog">Katalog</a></li>
                        <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
                        <li class="nav-item"><a class="nav-link" href="tentang.html">Tentang Kami</a></li>
                        <li class="nav-item"><a class="nav-link  text-white px-3" href="login.html" id="navLoginBtn">Login</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 56px);">

        <div class="card shadow-sm p-4 border-0" style="width: 100%; max-width: 400px; border-radius: 12px;">
        
        <div class="text-center mb-4">
            <h2 class="fw-bold tracking-wide text-uppercase" style="letter-spacing: 2px;">SecondKick</h2>
            <p class="text-muted small">Masuk untuk berburu pakaian favoritmu</p>
        </div>

        <div id="errorBox" class="alert alert-danger text-center py-2 d-none" role="alert">
            Email atau password salah!
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold text-secondary">Email</label>
                <input type="email" id="email" class="form-control py-2" placeholder="Masukkan email kamu" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold text-secondary">Password</label>
                <input type="password" id="password" class="form-control py-2" placeholder="Masukkan password" required>
            </div>

            <button type="submit" class="btn bg-dark-thrift w-100 py-2 fw-bold mt-2">MASUK</button>
        </form>

        <div class="text-center mt-4 small text-muted">
            Belum punya akun? <a href="register.html" class="text-dark fw-bold text-decoration-none">Daftar Sekarang</a>
        </div>
    </div>

    </main>

    <script>
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorBox = document.getElementById('errorBox');

    loginForm.addEventListener('submit', function(event) {
        event.preventDefault(); // Menahan refresh halaman

        // Data akun sementara (karena tidak pakai database)
        const emailBenar = "admin@gmail.com";
        const passwordBenar = "trift123";

        if (emailInput.value === emailBenar && passwordInput.value === passwordBenar) {
            alert("Login Sukses! Selamat berbelanja.");
            
            // PINDAH KE HALAMAN UTAMA (Sesuaikan nama filenya)
            window.location.href = "FinalProjectPPW.html"; 
            
        } else {
            // Jika salah, kotak merah dimunculkan
            errorBox.classList.remove('d-none');
        }
    });
</script>

</body>
</html>
